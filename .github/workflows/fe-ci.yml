name: FE CI

# ── Trigger ───────────────────────────────────────────────────────────────────
# Runs on every PR targeting master/main.
# No real backend services are needed — all API calls are intercepted by
# Playwright's route mocking inside the tests.
# ─────────────────────────────────────────────────────────────────────────────
on:
  pull_request:
    branches: [master, main]
  # Allow manual runs from the Actions tab
  workflow_dispatch:

jobs:
  fe-ci:
    name: FE CI Tests (mocked BE)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # GitHub-hosted runners have Chrome pre-installed.
      # Playwright's channel: 'chrome' in the config picks it up automatically —
      # no separate browser download needed.
      - name: Install Playwright dependencies (no browser download)
        run: npx playwright install-deps chrome

      # ── Pact consumer contract tests ──────────────────────────────────────
      # Runs Vitest in Node mode — no browser needed, Pact spins up its own
      # mock HTTP server per interaction.
      # Generated pact file: pacts/loyalty-ui-loyalty-mediation.json
      - name: Run Pact consumer contract tests
        run: npm run test:contract

      - name: Upload pact file
        uses: actions/upload-artifact@v4
        with:
          name: pact-loyalty-ui-loyalty-mediation
          # pacts/ dir lives at the repo root (two levels above tests/contract/)
          path: pacts/loyalty-ui-loyalty-mediation.json
          retention-days: 30

      # ── Playwright CI tests ────────────────────────────────────────────────
      - name: Run FE CI tests (fe-ci project)
        run: npm run test:ci

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-ci
          path: playwright-report/
          retention-days: 14

      - name: Upload test traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-ci
          path: test-results/
          retention-days: 7
